<!DOCTYPE html>
<html lang="ja">
<head><link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest"><link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="icons/site.webmanifest">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIRE計画</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;padding:12px;max-width:600px;margin:auto}
h1{font-size:22px;text-align:center;margin:12px 0;color:#333}
.sub-note{font-size:12px;text-align:center;color:#777;margin:-6px 0 10px}
.card{background:#fff;border-radius:14px;padding:16px;margin:10px 0;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* 入力エリア */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.input-item label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.input-with-unit{position:relative}
.input-item input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 34px 10px 10px;font-size:15px;text-align:right}
.input-unit{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:13px;color:#777;pointer-events:none}
.input-item input[type=number]::-webkit-outer-spin-button,
.input-item input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.input-item input[type=number]{appearance:textfield;-moz-appearance:textfield}
.input-item.full{grid-column:1/-1}
.save-btn{width:100%;padding:14px;background:#ff6b35;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}
.small-note{font-size:12px;color:#777;line-height:1.6;margin-top:8px}
#pieWrap{height:260px}
.save-btn:active{background:#e55a25}

/* 総資産 */
.total-label{font-size:13px;color:#888;margin-bottom:4px}
.total-num{font-size:36px;font-weight:bold;color:#ff6b35}
.progress-bar-wrap{background:#eee;border-radius:8px;height:10px;margin:8px 0 4px}
.progress-bar{background:#ff6b35;border-radius:8px;height:10px;transition:.4s}
.progress-text{font-size:13px;color:#666}

/* 予測テーブル */
.forecast-title{font-size:15px;font-weight:bold;margin-bottom:10px;color:#333}
table{width:100%;border-collapse:collapse}
th{background:#fff8f5;color:#ff6b35;font-size:13px;padding:8px;border-bottom:2px solid #ffe0d0}
td{padding:10px 8px;text-align:center;font-size:14px;border-bottom:1px solid #f5f5f5}
tr:last-child td{border-bottom:none}

/* 履歴 */
.hist-title{font-size:15px;font-weight:bold;margin-bottom:8px;color:#333}
.hist-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.hist-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px;color:#555}
.hist-row:last-child{border-bottom:none}
.hist-main{display:flex;justify-content:space-between;gap:10px;flex:1}
.hist-date-btn{border:none;background:none;color:#ff6b35;font:inherit;font-weight:bold;cursor:pointer;padding:0;text-align:left}
.delete-btn{border:1px solid #ffd3c5;background:#fff7f3;color:#c84d2f;border-radius:8px;font-size:12px;padding:5px 8px;cursor:pointer;white-space:nowrap}
.delete-btn:active{background:#ffe8df}
.history-detail{background:#fff8f5;border-radius:10px;margin:10px 0 2px;padding:10px}
.ratio-row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #f2f2f2;font-size:13px}
.ratio-row:last-child{border-bottom:none;font-weight:bold}
.ratio-val{text-align:right;color:#333}

/* グラフ */
#chartWrap{height:280px}
</style>
</head>
<body>
<h1>FIRE計画</h1>

<!-- 入力カード -->
<div class="card">
  <div class="input-grid">
    <div class="input-item">
      <label>楽天証券</label>
      <div class="input-with-unit"><input id="rakuten" type="text" inputmode="numeric" enterkeyhint="next" data-money="true"><span class="input-unit">円</span></div>
    </div>
    <div class="input-item">
      <label>iDeCo</label>
      <div class="input-with-unit"><input id="ideco" type="text" inputmode="numeric" enterkeyhint="next" data-money="true"><span class="input-unit">円</span></div>
    </div>
    <div class="input-item">
      <label>現金</label>
      <div class="input-with-unit"><input id="cash" type="text" inputmode="numeric" enterkeyhint="next" data-money="true"><span class="input-unit">円</span></div>
    </div>
    <div class="input-item">
      <label>毎月積立額</label>
      <div class="input-with-unit"><input id="monthly" type="text" inputmode="numeric" enterkeyhint="next" data-money="true"><span class="input-unit">円</span></div>
    </div>
    <div class="input-item">
      <label>現在の年齢</label>
      <div class="input-with-unit"><input id="age" type="number" inputmode="numeric" enterkeyhint="next" value="46"><span class="input-unit">歳</span></div>
    </div>
    <div class="input-item">
      <label>FIRE目標額</label>
      <div class="input-with-unit"><input id="target" type="text" inputmode="numeric" enterkeyhint="done" data-money="true"><span class="input-unit">円</span></div>
    </div>
  </div>
  <button class="save-btn" onclick="saveAndUpdate()">💾 保存して更新</button>
</div>

<!-- 総資産 -->
<div class="card">
  <div class="total-label">総資産</div>
  <div id="totalAsset" class="total-num"></div>
  <div class="progress-bar-wrap"><div id="pBar" class="progress-bar" style="width:0%"></div></div>
  <div id="progress" class="progress-text"></div>
</div>

<!-- FIRE予測 -->
<div class="card" id="forecast"></div>

<!-- グラフ -->
<div class="card">
  <div style="font-size:15px;font-weight:bold;margin-bottom:10px;color:#333">資産推移シミュレーション</div>
  <div id="chartWrap"><canvas id="fireChart"></canvas></div>
</div>

<!-- 資産割合 -->
<div class="card">
  <div style="font-size:15px;font-weight:bold;margin-bottom:10px;color:#333">資産割合</div>
  <div id="pieWrap"><canvas id="assetPie"></canvas></div>
  <div class="small-note">現金・投資・iDeCoのバランス確認用です。</div>
</div>

<!-- 履歴 -->
<div class="card" id="history"></div>

<script>
let chart=null;
let pieChart=null;
let selectedHistoryMonth=null;
const fmt=n=>Number(n).toLocaleString('ja-JP')+'円';
const rawNum=value=>Number(String(value).replace(/,/g,''))||0;
const num=id=>rawNum(document.getElementById(id).value);
const age=()=>Math.max(num('age'),0);
const pctText=(part,all)=>all>0 ? (part/all*100).toFixed(1)+'%' : '0.0%';
const piePercentPlugin={
  id:'piePercentPlugin',
  afterDatasetsDraw(chart){
    const data=chart.data.datasets[0].data.map(Number);
    const sum=data.reduce((a,b)=>a+b,0);
    if(!sum) return;
    const {ctx}=chart;
    ctx.save();
    ctx.font='bold 14px -apple-system, sans-serif';
    ctx.fillStyle='#fff';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    chart.getDatasetMeta(0).data.forEach((arc,index)=>{
      const value=data[index];
      if(!value) return;
      const pos=arc.tooltipPosition();
      ctx.fillText(pctText(value,sum),pos.x,pos.y);
    });
    ctx.restore();
  }
};

function total(){ return num('rakuten')+num('ideco')+num('cash'); }

function simulate(rate, shock=0){
  let asset=(num('rakuten')+num('ideco'))*(1-shock/100);
  let cashFixed=num('cash');
  let goal=num('target');
  let add=num('monthly');
  let mr=Math.pow(1+rate/100,1/12)-1;
  for(let m=1;m<=600;m++){
    asset=asset*(1+mr)+add;
    if(asset+cashFixed>=goal) return m;
  }
  return 600;
}

function amountAfterYears(rate,years){
  let asset=num('rakuten')+num('ideco');
  let cashFixed=num('cash');
  let add=num('monthly');
  let mr=Math.pow(1+rate/100,1/12)-1;
  for(let i=0;i<years*12;i++) asset=asset*(1+mr)+add;
  return Math.round(asset+cashFixed);
}

function saveAndUpdate(){
  const month=new Date().toISOString().slice(0,7);
  let hist=JSON.parse(localStorage.getItem("fire_v63_history")||"[]");
  const row={
    month,
    rakuten:num('rakuten'),
    ideco:num('ideco'),
    cash:num('cash'),
    asset:total(),
    monthly:num('monthly'),
    age:age()
  };
  const idx=hist.findIndex(x=>x.month===month);
  if(idx>=0) hist[idx]=row; else hist.push(row);
  localStorage.setItem("fire_v63_history",JSON.stringify(hist));
  render();
}

function detailRows(rakuten,ideco,cash){
  const totalAsset=rakuten+ideco+cash;
  return `
    <div class="ratio-row"><span>楽天証券</span><span class="ratio-val">${fmt(rakuten)}</span></div>
    <div class="ratio-row"><span>iDeCo</span><span class="ratio-val">${fmt(ideco)}</span></div>
    <div class="ratio-row"><span>現金</span><span class="ratio-val">${fmt(cash)}</span></div>
    <div class="ratio-row"><span>合計</span><span class="ratio-val">${fmt(totalAsset)}</span></div>`;
}

function showHistoryDetail(month){
  selectedHistoryMonth=selectedHistoryMonth===month ? null : month;
  render();
}

function deleteHistoryMonth(month){
  if(!confirm(month+' の記録を消しますか？')) return;
  let hist=JSON.parse(localStorage.getItem("fire_v63_history")||"[]");
  hist=hist.filter(h=>h.month!==month);
  localStorage.setItem("fire_v63_history",JSON.stringify(hist));
  if(selectedHistoryMonth===month) selectedHistoryMonth=null;
  render();
}

function clearHistory(){
  if(!confirm('記録履歴を全部消しますか？')) return;
  localStorage.removeItem("fire_v63_history");
  selectedHistoryMonth=null;
  render();
}

function setupInputMove(){
  const ids=['rakuten','ideco','cash','monthly','age','target'];
  ids.forEach((id,index)=>{
    const input=document.getElementById(id);
    input.addEventListener('keydown',e=>{
      if(e.key!=='Enter') return;
      e.preventDefault();
      const nextId=ids[index+1];
      if(nextId){
        document.getElementById(nextId).focus();
      } else {
        document.querySelector('.save-btn').focus();
      }
    });
  });
}

function setupMoneyFormat(){
  document.querySelectorAll('[data-money="true"]').forEach(input=>{
    input.addEventListener('input',()=>{
      const value=input.value.replace(/[^\d]/g,'');
      input.value=value ? Number(value).toLocaleString('ja-JP') : '';
    });
  });
}

function render(){
  const t=total(), goal=num('target');
  const pct=goal>0 ? Math.min(t/goal*100,100) : 0;

  document.getElementById('totalAsset').textContent=fmt(t);
  document.getElementById('pBar').style.width=pct.toFixed(1)+'%';
  document.getElementById('progress').textContent='目標まで '+fmt(Math.max(goal-t,0))+' （達成率 '+pct.toFixed(1)+'%）';

  let html='<div class="forecast-title">🔥 FIREまでの予測</div><table><tr><th>利回り</th><th>あと何年？</th><th>達成年齢</th></tr>';
  [5,7,10,13].forEach(r=>{
    let m=simulate(r);
    html+=`<tr><td>${r}%</td><td>${Math.floor(m/12)}年${m%12}か月</td><td>${(age()+m/12).toFixed(1)}歳</td></tr>`;
  });
  html+='</table>';
  document.getElementById('forecast').innerHTML=html;

  const labels=["現在"];
  for(let i=1;i<=10;i++) labels.push(i+"年後");
  const d5=[],d7=[],d10=[],d13=[];
  for(let i=0;i<=10;i++){
    d5.push(amountAfterYears(5,i));
    d7.push(amountAfterYears(7,i));
    d10.push(amountAfterYears(10,i));
    d13.push(amountAfterYears(13,i));
  }

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("fireChart"),{
    type:"line",
    data:{labels,datasets:[
      {label:"5%",data:d5,borderColor:"#74b9ff",backgroundColor:"rgba(116,185,255,.1)",tension:.3,fill:false},
      {label:"7%",data:d7,borderColor:"#00b894",backgroundColor:"rgba(0,184,148,.1)",tension:.3,fill:false},
      {label:"10%",data:d10,borderColor:"#fd79a8",backgroundColor:"rgba(253,121,168,.1)",tension:.3,fill:false},
      {label:"13%",data:d13,borderColor:"#845ef7",backgroundColor:"rgba(132,94,247,.1)",tension:.3,fill:false},
      {label:"目標",data:new Array(labels.length).fill(goal),borderColor:"#ff6b35",borderDash:[8,5],pointRadius:0,tension:0,fill:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{y:{ticks:{callback:v=>(v/10000).toFixed(0)+'万',font:{size:11}},grid:{color:"#f0f0f0"}},x:{ticks:{font:{size:11}}}},
      plugins:{
        legend:{labels:{font:{size:11},boxWidth:20}},
        tooltip:{callbacks:{label:c=>c.dataset.label+": "+(c.parsed.y/10000).toFixed(0)+"万円"}}
      }
    }
  });

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(document.getElementById("assetPie"),{
    type:"doughnut",
    data:{labels:["楽天証券","iDeCo","現金"],datasets:[{
      data:[num('rakuten'),num('ideco'),num('cash')],
      backgroundColor:["#ff8a5b","#4dabf7","#51cf66"],
      borderColor:"#fff",
      borderWidth:3
    }]},
    plugins:[piePercentPlugin],
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{size:12}}},tooltip:{callbacks:{label:c=>c.label+": "+fmt(c.parsed)}}}}
  });

  let hist=JSON.parse(localStorage.getItem("fire_v63_history")||"[]");
  let hhtml=`<div class="hist-head"><div class="hist-title">📋 記録履歴</div>${hist.length ? '<button class="delete-btn" onclick="clearHistory()">全消去</button>' : ''}</div>`;
  if(hist.length===0){
    hhtml+='<div style="color:#aaa;font-size:13px">まだ記録がありません</div>';
  } else {
    hhtml+=hist.slice().reverse().map(h=>`
      <div class="hist-row"><div class="hist-main"><button class="hist-date-btn" onclick="showHistoryDetail('${h.month}')">${h.month}</button><span>${fmt(h.asset)}</span></div><button class="delete-btn" onclick="deleteHistoryMonth('${h.month}')">削除</button></div>`).join('');
    const selected=hist.find(h=>h.month===selectedHistoryMonth);
    if(selected){
      if(selected.rakuten==null || selected.ideco==null || selected.cash==null){
        hhtml+=`<div class="history-detail"><div class="small-note">この記録は古い形式なので、内訳は次回保存から表示されます。</div></div>`;
      } else {
        hhtml+=`<div class="history-detail">${detailRows(selected.rakuten,selected.ideco,selected.cash)}</div>`;
      }
    }
  }
  document.getElementById('history').innerHTML=hhtml;
}

setupInputMove();
setupMoneyFormat();
render();
</script>
</body>
</html>
